name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish from package.json
        required: true
        type: string

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package version
        run: |
          PACKAGE_VERSION="$(bun pm pkg get version | tr -d '\"')"
          if [ "$PACKAGE_VERSION" != "${{ inputs.version }}" ]; then
            echo "Input version ${{ inputs.version }} does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Validate
        run: bun run validate

      - name: Build
        run: bun run build

      - name: Publish restricted package
        run: bun publish --access restricted
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
